    <main class="container">
        <h1>退換貨方法</h1>
        <section>
            <h2>7 天鑑賞期</h2>
            <p>根據消費者保護法，您在收到商品後享有 7 天的免費鑑賞期。請注意，鑑賞期並非試用期。</p>
        </section>
        <section>
            <h2>退貨條件</h2>
            <ul>
                <li>商品必須保持全新狀態（無穿著痕跡、無污損）。</li>
                <li>完整包裝（含鞋盒、標籤、附件及贈品）。</li>
                <li>請勿直接在原廠鞋盒上黏貼膠帶或寫字，請外加包裝袋。</li>
            </ul>
        </section>
        <section>
            <h2>換貨流程</h2>
            <p>若尺寸不合，請於 7 天內聯繫客服，我們將為您安排更換尺寸（每筆訂單限更換一次，運費由我方負擔）。</p>
        </section>
